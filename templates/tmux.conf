# Tmux Matugen Theme
# Generated by matugen - {{mode}} variant

# Status bar
set -g status-style "bg={{colors.surface_container.default.hex}},fg={{colors.on_surface.default.hex}}"
set -g status-left-style "bg={{colors.primary.default.hex}},fg={{colors.on_primary.default.hex}}"
set -g status-right-style "bg={{colors.surface_container_high.default.hex}},fg={{colors.on_surface.default.hex}}"

# Window status
set -g window-status-style "bg={{colors.surface_container.default.hex}},fg={{colors.on_surface_variant.default.hex}}"
set -g window-status-current-style "bg={{colors.primary_container.default.hex}},fg={{colors.on_primary_container.default.hex}}"
set -g window-status-activity-style "bg={{colors.secondary_container.default.hex}},fg={{colors.on_secondary_container.default.hex}}"

# Pane borders
set -g pane-border-style "fg={{colors.outline_variant.default.hex}}"
set -g pane-active-border-style "fg={{colors.primary.default.hex}}"

# Message/command line
set -g message-style "bg={{colors.surface_container_high.default.hex}},fg={{colors.on_surface.default.hex}}"
set -g message-command-style "bg={{colors.surface_container_high.default.hex}},fg={{colors.on_surface.default.hex}}"

# Copy mode
set -g mode-style "bg={{colors.primary_container.default.hex}},fg={{colors.on_primary_container.default.hex}}"

# Clock
set -g clock-mode-colour "{{colors.primary.default.hex}}"
