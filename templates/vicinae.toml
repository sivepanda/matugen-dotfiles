# Matugen Theme for Vicinae

[meta]
version = 1
name = "Matugen"
description = "Material You theme generated by Matugen"
variant = "{{mode}}"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "{{colors.primary.default.hex}}"
accent_foreground = "{{colors.on_primary.default.hex}}"
background = "{{colors.surface.default.hex}}"
foreground = "{{colors.on_surface.default.hex}}"
secondary_background = "{{colors.surface_container.default.hex}}"
border = "{{colors.outline_variant.default.hex}}"

# ============================================================================
# Window-Specific Colors
# ============================================================================

[colors.main_window]
border = "colors.core.border"

[colors.settings_window]
border = "{{colors.outline.default.hex}}"

# ============================================================================
# Accent Colors
# ============================================================================

[colors.accents]
blue = "colors.core.accent"
green = "{{colors.tertiary.default.hex}}"
magenta = "{{colors.secondary.default.hex}}"
orange = { name = "colors.accents.red", lighter = 40 }
red = "{{colors.error.default.hex}}"
yellow = { name = "colors.accents.green", lighter = 80 }
cyan = { name = "colors.core.accent", lighter = 50 }
purple = "colors.accents.magenta"

# ============================================================================
# Text Colors
# ============================================================================

[colors.text]
default = "colors.core.foreground"
muted = "{{colors.on_surface_variant.default.hex}}"
danger = "colors.accents.red"
success = "colors.accents.green"
placeholder = { name = "colors.text.muted", opacity = 0.6 }
selection = { background = "colors.core.accent", foreground = "colors.core.accent_foreground" }

[colors.text.links]
default = "colors.core.accent"
visited = { name = "colors.accents.green", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "{{colors.outline.default.hex}}"
border_focus = "colors.core.accent"
border_error = "colors.accents.red"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "{{colors.surface_container_high.default.hex}}"
foreground = "colors.core.foreground"
hover = { background = "{{colors.surface_container_highest.default.hex}}" }
focus = { outline = "colors.core.accent" }

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "{{colors.primary_container.default.hex}}", opacity = 0.25 }
foreground = "colors.core.foreground"

[colors.list.item.selection]
background = { name = "{{colors.primary_container.default.hex}}", opacity = 0.50 }
foreground = "{{colors.on_primary_container.default.hex}}"
secondary_background = "{{colors.primary_container.default.hex}}"
secondary_foreground = "{{colors.on_primary_container.default.hex}}"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "colors.core.secondary_background"
hover = { outline = { name = "colors.accents.magenta", opacity = 0.8 } }
selection = { outline = "colors.core.accent" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "colors.core.accent", opacity = 0.2 }

# ============================================================================
# Loading Indicators
# ============================================================================

[colors.loading]
bar = "colors.core.accent"
spinner = "colors.core.accent"
