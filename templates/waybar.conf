/* output: ~/.config/waybar/style.css */

@keyframes blink-warning {
    70% {
        color: @text_primary;
    }

    to {
        color: @text_primary;
        background-color: @warning;
    }
}

@keyframes blink-critical {
    70% {
      color: @text_primary;
    }

    to {
        color: @text_primary;
        background-color: @critical;
    }
}


/* -----------------------------------------------------------------------------
 * Styles
 * -------------------------------------------------------------------------- */

/* COLORS - Generated by Matugen */

/* ===== MATUGEN PALETTE ===== */
@define-color primary {{ colors.primary.default.hex }};
@define-color on_primary {{ colors.on_primary.default.hex }};
@define-color primary_container {{ colors.primary_container.default.hex }};
@define-color on_primary_container {{ colors.on_primary_container.default.hex }};

@define-color secondary {{ colors.secondary.default.hex }};
@define-color on_secondary {{ colors.on_secondary.default.hex }};
@define-color secondary_container {{ colors.secondary_container.default.hex }};
@define-color on_secondary_container {{ colors.on_secondary_container.default.hex }};

@define-color tertiary {{ colors.tertiary.default.hex }};
@define-color on_tertiary {{ colors.on_tertiary.default.hex }};
@define-color tertiary_container {{ colors.tertiary_container.default.hex }};
@define-color on_tertiary_container {{ colors.on_tertiary_container.default.hex }};

@define-color error {{ colors.error.default.hex }};
@define-color on_error {{ colors.on_error.default.hex }};
@define-color error_container {{ colors.error_container.default.hex }};
@define-color on_error_container {{ colors.on_error_container.default.hex }};

@define-color background {{ colors.background.default.hex }};
@define-color on_background {{ colors.on_background.default.hex }};

@define-color surface {{ colors.surface.default.hex }};
@define-color on_surface {{ colors.on_surface.default.hex }};
@define-color surface_variant {{ colors.surface_variant.default.hex }};
@define-color on_surface_variant {{ colors.on_surface_variant.default.hex }};

@define-color outline {{ colors.outline.default.hex }};
@define-color outline_variant {{ colors.outline_variant.default.hex }};

@define-color inverse_surface {{ colors.inverse_surface.default.hex }};
@define-color inverse_on_surface {{ colors.inverse_on_surface.default.hex }};
@define-color inverse_primary {{ colors.inverse_primary.default.hex }};

@define-color shadow {{ colors.shadow.default.hex }};
@define-color scrim {{ colors.scrim.default.hex }};

/* Additional Colors */
@define-color transparent rgba(0,0,0,0);

/* ===== SEMANTIC THEME MAPPING ===== */
@define-color text_primary @on_background;
@define-color text_secondary @on_surface_variant;
@define-color text_inactive @outline;
@define-color text_active @primary;
@define-color bg_base @background;
@define-color bg_dark @surface;

/* ===== SEMANTIC COLORS ===== */
@define-color warning @tertiary;
@define-color critical @error;
@define-color urgent @error;

/* ===== MODULE BACKGROUNDS ===== */
@define-color bg @transparent;
@define-color bg_1 @transparent;
@define-color mode @surface;
@define-color workspacesfocused @surface_variant;
@define-color tray @workspacesfocused;
@define-color sound @surface;
@define-color network @surface;
@define-color memory @surface;
@define-color cpu @surface;
@define-color temp @secondary_container;
@define-color layout @primary;
@define-color battery @primary_container;
@define-color date @surface_variant;
@define-color time @surface_variant;
@define-color backlight @surface_variant;

/* ===== DEPRECATED (kept for compatibility) ===== */
@define-color light @text_primary;
@define-color dark @bg_dark;
@define-color nord_light @on_background;
@define-color nord_light_font @text_primary;
@define-color nord_dark_font @text_secondary;
@define-color workspace_inactive @text_inactive;
@define-color workspace_active @text_active;
@define-color source_muted_bg @tertiary_container;

/* Reset all styles */
* {
    border: none;
    border-radius: 3px;
    min-height: 0;
    margin: 0.1em 0.3em 0.1em 0.3em;
    background: rgba(0,0,0,0);
}

/* The whole bar */
#waybar {
    background: rgba(0,0,0,0);
    color: @text_primary;
    /* font-family: "Cantarell", "Font Awesome 5 Pro"; */
    font-family: "JetBrainsMono Nerd Font";
    font-size: 13px;
    font-weight: bold;
    margin-top: 5em;
    border-radius: 10px;
}

tooltip {
    background: @bg_dark;
}

/* Each module */
#battery,
#clock,
#cpu,
#custom-layout,
#memory,
#mode,
#network,
#pulseaudio,
#temperature,
#custom-alsa,
#custom-pacman,
#custom-weather,
#custom-gpu,
#tray,
#backlight,
#language,
#custom-media,
#custom-cpugovernor {
    padding-left: 0.6em;
    padding-right: 0.6em;
}

/* Each module that should blink */
#mode,
#memory,
#temperature,
#battery {
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    animation-direction: alternate;
}

/* Each critical module */
#memory.critical,
#cpu.critical,
#temperature.critical,
#battery.critical {
    color: @critical;
}

/* Each critical that should blink */
#mode,
#memory.critical,
#temperature.critical,
#battery.critical.discharging {
    animation-name: blink-critical;
    animation-duration: 2s;
}

/* Each warning */
#network.disconnected,
#memory.warning,
#cpu.warning,
#temperature.warning,
#battery.warning {
    background: @warning;
    color: @text_secondary;
}

/* Each warning that should blink */
#battery.warning.discharging {
    animation-name: blink-warning;
    animation-duration: 3s;
}

/* And now modules themselves in their respective order */

#mode { /* Shown current Sway mode (resize etc.) */
    color: @bg_dark;
    background: @mode;
}

/* Workspaces stuff */

#workspaces {
 /*   color: #D8DEE9;
    margin-right: 10px;*/
}

#workspaces button {
    font-weight: bold;
    padding: 0;
    color: @workspace_inactive;
    opacity: 0.3;
    background: none;
    font-size: 1em;
}

#workspaces button.active{
    color: @workspace_active;
    font-weight: bold;
    opacity: 1;
    padding: 0 0.4em;
}

#workspaces button.urgent {
    border-color: @urgent;
    color: @urgent;
    opacity: 1;
}

#window {
    margin-right: 40px;
    margin-left: 40px;
    font-weight: normal;
}

#bluetooth {
    background: @bg_1;
    font-size: 1.2em;
    font-weight: bold;
    padding: 0 0.6em;
}

#custom-media,
#custom-gpu {
    background: @bg;
    font-weight: bold;
    padding: 0 0.6em;
}

#custom-weather {
    background: @mode;
    font-weight: bold;
    padding: 0 0.6em;
}

#custom-pacman {
    font-weight: bold;
    padding: 0 0.6em;
}

#custom-scratchpad-indicator {
    font-weight: bold;
    padding: 0 0.6em;
}

#idle_inhibitor {
    background: @mode;
    font-weight: bold;
    padding: 0 0.6em;
}

#custom-alsa {
    background: @sound;
}

#network {
    background: @bg_1;
}

#memory {
    background: @memory;
}

#cpu {
    background: @bg;
    color: @text_primary;
}
#cpu.critical {
    color: @text_secondary;
}
#language {
    background: @bg_1;
    color: @text_primary;
    padding: 0 0.4em;
}
#custom-cpugovernor {
    background-color: @nord_light;
    color: @text_secondary;
}
#custom-cpugovernor.perf {

}
#temperature {
    background-color: @bg;
    color: @text_primary;
}
#temperature.critical {
    background:  @critical;
}
#custom-layout {
    background: @layout;
}

#custom-media {
    background: @bg;
}

#battery {
    background: @battery;
}

#backlight {
    background: @backlight;
}

#clock {
    background: @bg_1;
    color: @text_primary;
}
#clock.date {
    background: @date;
}

#clock.time {
    background: @mode;
}

#pulseaudio {
    background: @bg_1;
    color: @text_primary;
}

#pulseaudio.muted {
    background: @critical;
    color: @critical;
}
#pulseaudio.source-muted {
    background: @source_muted_bg;
    color: @text_primary;
}
#tray {
}
